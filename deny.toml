# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check
# Install: cargo install cargo-deny

[advisories]
# Scope for unmaintained crate advisories: all, workspace, transitive, none
unmaintained = "workspace"
# Scope for unsound crate advisories: all, workspace, transitive, none
unsound = "workspace"
# Lint level for crates that have been yanked
yanked = "warn"

[licenses]
# Confidence threshold for license detection (0.0 - 1.0)
confidence-threshold = 0.8
# List of allowed licenses (SPDX identifiers)
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "LGPL-2.1-or-later",
]

# Treat unpublished workspace crates as private (no license required)
[licenses.private]
ignore = true

[bans]
# Lint level for multiple versions of the same crate
multiple-versions = "warn"
# Lint level for wildcard dependencies (e.g. `*`)
wildcards = "allow"

[sources]
# Lint level for crates not from an allowed source
unknown-registry = "deny"
# Lint level for crates not from an allowed git repository
unknown-git = "warn"
# Allowed registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
