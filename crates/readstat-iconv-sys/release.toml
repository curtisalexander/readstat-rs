# Per-crate cargo-release config for `readstat-iconv-sys`.
# Inherits workspace defaults from release.toml at the repo root.
#
# Namespace the tag so it can't collide with `readstat`'s or `readstat-sys`'s
# `v{{version}}` tags: the crates are versioned independently.
tag-name = "readstat-iconv-sys-v{{version}}"

# Keep the crate version cited in docs/ARCHITECTURE.md in sync on release.
[[pre-release-replacements]]
file = "../../docs/ARCHITECTURE.md"
search = "### `readstat-iconv-sys` \\(v[0-9]+\\.[0-9]+\\.[0-9]+\\)"
replace = "### `readstat-iconv-sys` (v{{version}})"
exactly = 1
