name: readstat-rs

env:
  PACKAGE_NAME: readstat
  CARGO_TERM_COLOR: always

on:
  # Trigger on tag push (for releases)
  push:
    tags:
      - "*"
    # Trigger tests (but not releases) on branch pushes
    branches: [main, dev]

  # Trigger tests on PRs targeting main or dev
  pull_request:
    branches: [main, dev]

  # Manual trigger from GitHub Actions UI (build-only, no releases)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for artifacts (e.g., v0.14.0 or dev)'
        required: false
        default: 'dev'

  # API trigger for external tools (e.g., Claude Code)
  repository_dispatch:
    types: [build, test, release]

jobs:
  # Lightweight CI: tests only, runs on branch pushes and PRs (not on tag releases).
  ci-test:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Check Arrow/DataFusion lockstep
        run: ./scripts/check-arrow-lockstep.sh
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y build-essential clang
      - name: Test
        run: cargo test --workspace

  release-notes:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate changelog
        run: |
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1 || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          else
            RANGE="${CURRENT_TAG}"
          fi
          {
            echo "## What's Changed in ${CURRENT_TAG}"
            echo ""
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "**Full Changelog**: \`${PREVIOUS_TAG}...${CURRENT_TAG}\`"
              echo ""
            fi
            # Collect commits
            FEATURES=""
            FIXES=""
            OTHER=""
            while IFS= read -r line; do
              subject=$(echo "$line" | sed 's/^[a-f0-9]* //')
              hash=$(echo "$line" | awk '{print $1}')
              entry="- ${subject} (${hash})"
              lower=$(echo "$subject" | tr '[:upper:]' '[:lower:]')
              if echo "$lower" | grep -qE "^(add|implement|support|introduce|create|enable)"; then
                FEATURES="${FEATURES}${entry}\n"
              elif echo "$lower" | grep -qE "^(fix|correct|resolve|patch|address|repair)"; then
                FIXES="${FIXES}${entry}\n"
              else
                OTHER="${OTHER}${entry}\n"
              fi
            done < <(git log --oneline --no-merges "$RANGE" 2>/dev/null)
            if [ -n "$FEATURES" ]; then
              echo "### Added"
              echo -e "$FEATURES"
            fi
            if [ -n "$FIXES" ]; then
              echo "### Fixed"
              echo -e "$FIXES"
            fi
            if [ -n "$OTHER" ]; then
              echo "### Changed"
              echo -e "$OTHER"
            fi
          } > release-notes.md
      - name: Create release with notes
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-gnu:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    env:
      target: x86_64-unknown-linux-gnu
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.client_payload.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace
      - name: Build
        run: cargo build --release && strip target/release/${{ env.PACKAGE_NAME }}
      - name: Zip
        run: tar czvf target/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz --directory=target/release ${{ env.PACKAGE_NAME }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}
          path: target/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-linux-musl:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    env:
      target: x86_64-unknown-linux-musl
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.client_payload.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Add musl-tools
        run: sudo apt-get update -y && sudo apt-get upgrade -y && sudo apt-get install build-essential musl musl-dev musl-tools libclang-dev clang -y
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl && strip target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}
      - name: Zip
        run: tar czvf target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz --directory=target/${{ env.target }}/release ${{ env.PACKAGE_NAME }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}
          path: target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-linux-arm:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    env:
      target: aarch64-unknown-linux-gnu
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.client_payload.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        run: sudo apt-get update -y && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ env.target }}
          aarch64-linux-gnu-strip target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}
      - name: Zip
        run: tar czvf target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz --directory=target/${{ env.target }}/release ${{ env.PACKAGE_NAME }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}
          path: target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-win:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: windows-latest
    env:
      target: x86_64-pc-windows-msvc
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.client_payload.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi
        shell: bash
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Zip
        run: Compress-Archive -Path target\release\${{ env.PACKAGE_NAME }}.exe -DestinationPath target\release\${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.zip  -CompressionLevel Optimal
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}
          path: target/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.zip
      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build-macos-x86:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: macos-latest
    env:
      target: x86_64-apple-darwin
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.client_payload.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build
        # macos-latest is an arm64 runner; build with an explicit --target so
        # the x86_64 artifact is actually an x86_64 binary (a bare
        # `cargo build` would cross-label an arm64 binary as x86_64).
        run: cargo build --release --target ${{ env.target }} && strip target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}
      - name: Zip
        run: tar czvf target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz --directory=target/${{ env.target }}/release ${{ env.PACKAGE_NAME }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}
          path: target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: macos-latest
    env:
      target: aarch64-apple-darwin
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${{ github.event.client_payload.version || 'dev' }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.target }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build
        # Explicit --target keeps the output path consistent with the x86 job
        # and is robust to the runner's host arch.
        run: cargo build --release --target ${{ env.target }} && strip target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}
      - name: Zip
        run: tar czvf target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz --directory=target/${{ env.target }}/release ${{ env.PACKAGE_NAME }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}
          path: target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/${{ env.target }}/release/${{ env.PACKAGE_NAME }}-${{ steps.get_version.outputs.VERSION }}-${{ env.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Memory safety checks ---

  miri:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-disable-isolation"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install nightly toolchain with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run Miri on pure-Rust unit tests
        # Skip proptest suites: they run 256 cases each and are 100-1000x slower
        # under Miri's interpreter. All proptest tests live in `property_tests`
        # submodules. Everything else (ptr_to_string unsafe, build_offsets, err,
        # rs_path) runs and gives Miri coverage over both unsafe and safe Rust.
        run: cargo +nightly miri test -p readstat -- --skip property_tests

  asan-linux:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Zsanitizer=address -Clinker=clang"
      READSTAT_SANITIZE_ADDRESS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run tests with AddressSanitizer
        run: cargo +nightly test --workspace --lib --tests --bins --target x86_64-unknown-linux-gnu

  asan-macos:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: macos-latest
    env:
      RUSTFLAGS: "-Zsanitizer=address"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-darwin
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run tests with AddressSanitizer
        run: cargo +nightly test --workspace --lib --tests --bins --target aarch64-apple-darwin

  asan-windows:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: windows-latest
    env:
      RUSTFLAGS: "-Zsanitizer=address"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      # The ASAN runtime comes from Visual Studio (MSVC). `readstat-sys`
      # ships pre-generated bindings, so no LLVM/libclang install needed.
      - name: Find MSVC ASAN runtime
        id: asan-rt
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          $msvcRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $msvcVer = (Get-ChildItem $msvcRoot | Sort-Object Name -Descending | Select-Object -First 1).Name
          $asanDir = Join-Path $msvcRoot $msvcVer "bin" "Hostx64" "x64"
          $asanDll = Join-Path $asanDir "clang_rt.asan_dynamic-x86_64.dll"
          if (!(Test-Path $asanDll)) { throw "ASAN runtime not found at $asanDll" }
          Write-Host "Found ASAN runtime: $asanDll"
          echo "dir=$asanDir" >> $env:GITHUB_OUTPUT
      - name: Run tests with AddressSanitizer
        run: |
            $env:PATH = "${{ steps.asan-rt.outputs.dir }};$env:PATH"
            cargo +nightly test --workspace --lib --tests --bins --target x86_64-pc-windows-msvc

  # Option 2: Full Rust + C ASAN instrumentation on Windows.
  # Both Rust and MSVC's cl.exe use the same MSVC ASAN runtime, so full
  # instrumentation SHOULD work. Marked continue-on-error because this is
  # experimental — no one has publicly documented this combination working.
  asan-windows-full:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: windows-latest
    continue-on-error: true
    env:
      RUSTFLAGS: "-Zsanitizer=address"
      READSTAT_SANITIZE_ADDRESS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      # The ASAN runtime comes from Visual Studio (MSVC). `readstat-sys`
      # ships pre-generated bindings, so no LLVM/libclang install needed.
      - name: Find MSVC ASAN runtime
        id: asan-rt
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -property installationPath
          $msvcRoot = Join-Path $vsPath "VC\Tools\MSVC"
          $msvcVer = (Get-ChildItem $msvcRoot | Sort-Object Name -Descending | Select-Object -First 1).Name
          $asanDir = Join-Path $msvcRoot $msvcVer "bin" "Hostx64" "x64"
          $asanDll = Join-Path $asanDir "clang_rt.asan_dynamic-x86_64.dll"
          if (!(Test-Path $asanDll)) { throw "ASAN runtime not found at $asanDll" }
          Write-Host "Found ASAN runtime: $asanDll"
          echo "dir=$asanDir" >> $env:GITHUB_OUTPUT
      - name: Run tests with AddressSanitizer (full C+Rust)
        run: |
            $env:PATH = "${{ steps.asan-rt.outputs.dir }};$env:PATH"
            cargo +nightly test --workspace --lib --tests --bins --target x86_64-pc-windows-msvc
