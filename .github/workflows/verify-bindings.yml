name: Verify pre-generated bindings

# Confirms two things across Linux / macOS / Windows:
#
#   1. `consume`: the checked-in `crates/readstat-sys/src/bindings/<os>.rs`
#      compiles and tests pass with default features (no `buildtime_bindgen`).
#      This is the load-bearing check — it proves the per-target pre-gen
#      files match each platform's actual ABI.
#
#   2. `regen`: `--features buildtime_bindgen` runs bindgen and reproduces
#      the corresponding per-target file. Uploads each regenerated file as
#      an artifact, and diffs it against the checked-in version so any
#      drift surfaces in the job log.
#
# Safe to delete once the per-target pre-gen approach is confirmed.

on:
  push:
    branches: [libc-bindings-and-verify]
  workflow_dispatch:

jobs:
  consume:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            file: linux.rs
          - os: macos-latest
            file: macos.rs
          - os: windows-latest
            file: windows.rs
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build with default features (consumes pre-gen ${{ matrix.file }})
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  regen:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            file: linux.rs
          - os: macos-latest
            file: macos.rs
          - os: windows-latest
            file: windows.rs
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install LLVM (Windows only — bindgen needs libclang)
        if: matrix.os == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Regenerate bindings
        run: cargo build -p readstat-sys --features buildtime_bindgen

      - name: Show diff vs checked-in
        shell: bash
        run: |
          echo "::group::Diff on ${{ matrix.os }}"
          git --no-pager diff --no-color crates/readstat-sys/src/bindings/${{ matrix.file }} || true
          echo "::endgroup::"

      - name: Upload regenerated bindings
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.os }}
          path: crates/readstat-sys/src/bindings/${{ matrix.file }}
